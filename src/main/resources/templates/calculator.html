<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матричный калькулятор</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app">
    <h1>Матричный калькулятор</h1>

    <div id="operation-selector"></div>

    <div id="slae-panel" style="display: none;">
        <div class="section">
            <h3>Решение СЛАУ</h3>
            <div class="method-selector">
                <label>Метод решения:
                    <select id="slae-method">
                        <option value="matrix">Матричный метод</option>
                        <option value="cramer">Метод Крамера</option>
                        <option value="gauss" selected>Метод Гаусса</option>
                    </select>
                </label>
            </div>
        </div>
    </div>

    <div id="matrix-a-panel">
        <h3>Матрица A <span id="matrix-a-size"></span></h3>
        <div class="size-controls">
            <label>Строки: <input type="number" id="rows-a" min="1" value="3"></label>
            <label>Столбцы: <input type="number" id="cols-a" min="1" value="3"></label>
            <button id="resize-a">Применить размер</button>
        </div>
        <div id="matrix-a"></div>
    </div>

    <div id="matrix-b-panel">
        <h3>Матрица B <span id="matrix-b-size"></span></h3>
        <div class="size-controls">
            <label>Строки: <input type="number" id="rows-b" min="1" value="3"></label>
            <label>Столбцы: <input type="number" id="cols-b" min="1" value="3"></label>
            <button id="resize-b">Применить размер</button>
        </div>
        <div id="matrix-b"></div>
    </div>

    <div id="vector-b-panel" style="display: none;">
        <h3>Вектор правых частей B</h3>
        <div id="vector-b"></div>
    </div>

    <div id="scalar-panel" style="display: none;">
        <label>Множитель: <input type="number" id="scalar" value="1" step="any"></label>
    </div>

    <button id="calculate-btn">Вычислить</button>

    <div id="steps-panel" class="steps" style="display: none;">
        <h3>Ход решения:</h3>
        <div id="steps-list"></div>
    </div>

    <div id="result"></div>
    <div id="error" class="error" style="display: none;"></div>
</div>

<script src="/js/calculator.js"></script>
</body>
</html>
